<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VWorld 2D Basic Example</title>
  <link rel="stylesheet" href="./static/style.css">
  <script src="./static/config.js"></script>
  <script>
    (function () {
      const apiKey = window.VWORLD_CONFIG?.apiKey?.trim();

      if (!apiKey) {
        window.VWORLD_BOOTSTRAP = { skipped: true };
        return;
      }

      const isHttps = window.location.protocol === "https:";
      const baseUrl = isHttps ? "https://map.vworld.kr" : "http://map.vworld.kr";
      const params = new URLSearchParams({
        version: "2.0",
        apiKey,
        domain: window.location.host,
      });

      window.VWORLD_BOOTSTRAP = { skipped: false };
      document.write(`<script src="${baseUrl}/js/vworldMapInit.js.do?${params.toString()}"><\/script>`);
    }());
  </script>
</head>
<body>
  <div class="topbar">
    <strong>VWorld 2D Basic Example</strong>
    <span id="status">지도 초기화 대기</span>
  </div>
  <div id="vmap" class="map-root"></div>
  <script src="./static/app.js"></script>
</body>
</html>
