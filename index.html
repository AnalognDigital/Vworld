<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VWorld WebGL 3D Sample</title>
  <link rel="stylesheet" href="./static/style.css">
  <script src="./static/config.js"></script>
  <script>
    (function () {
      const apiKey = window.VWORLD_CONFIG?.apiKey?.trim();

      if (!apiKey) {
        window.VWORLD_BOOTSTRAP = { skipped: true };
        return;
      }

      const baseUrl = window.location.protocol === "https:" ? "https://map.vworld.kr" : "http://map.vworld.kr";
      const domainValue = window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost"
        ? window.location.host
        : window.location.origin;
      const params = new URLSearchParams({
        version: "3.0",
        apiKey,
        domain: domainValue,
      });
      window.VWORLD_BOOTSTRAP = { skipped: false };
      document.write(`<script src="${baseUrl}/js/webglMapInit.js.do?${params.toString()}"><\/script>`);
    }());
  </script>
</head>
<body>
  <div class="topbar">
    <strong>VWorld WebGL 3D Sample</strong>
    <span id="status">3D 지도 초기화 대기</span>
  </div>
  <div id="vmap" class="map-root"></div>
  <div class="controls">
    <button type="button" onclick="vwmoveTo(126.9231,37.5262083301207,5000)">여의도</button>
    <button type="button" onclick="vwmoveTo(131.864677840073,37.2414795955336,2000)">독도</button>
    <button type="button" onclick="vwmoveTo(126.9770,37.5778,3000)">경복궁</button>
  </div>
  <script src="./static/app.js"></script>
</body>
</html>
